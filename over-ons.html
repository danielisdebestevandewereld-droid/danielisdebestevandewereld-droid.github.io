  const logo = document.querySelector('.logo');

      }

</script>

<script>
  document.body.addEventListener('dblclick', (event) => {
    const clickX = event.clientX
    const clickY = event.clientY

    for (let i = 0; i < 300; i++) {
      createParticle(clickX, clickY);
    }
  });

  function createParticle(x, y) {
    const particle = document.createElement('div');
    particle.classList.add('particle');
    particle.style.left = x + 'px';
    particle.style.top = y + 'px';

    const moveX = (Math.random() - 1 ) * 3000;
    const moveY = (Math.random() - 1 ) * 3000;
    
    particle.style.setProperty('--x', `${moveX}px`);
    particle.style.setProperty('--y', `${moveY}px`);

    const randomHue = Math.random() * 360;
    particle.style.backgroundColor = `hsl(${randomHue}, 100%, 80%)`;

    document.body.appendChild(particle);

    setTimeout(() => {
      particle.remove();
    }, 3000);
  }
</script>
